server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    location /auth {
        proxy_pass http://backend:3000;
    }

    location /tasks {
        proxy_pass http://backend:3000;
    }

    location /habits {
        proxy_pass http://backend:3000;
    }
}
